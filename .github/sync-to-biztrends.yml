# .github/sync-to-biztrends.yml
group:
  - files:
      - source: data/reports/raw_yahoo_finance_summary_latest.csv
        dest:   data/Yahoo.Finance/raw_yahoo_finance_summary_latest.csv
      - source: data/reports/raw_yahoo_finance.csv
        dest:   data/Yahoo.Finance/raw_yahoo_finance.csv
      - source: data/reports/raw_yahoo_finance_intraday_60m.csv
        dest:   data/Yahoo.Finance/raw_yahoo_finance_intraday_60m.csv
      - source: data/reports/raw_wayback_yahoo_finance_consensus.csv
        dest:   data/Yahoo.Finance/raw_wayback_yahoo_finance_consensus.csv
      - source: data/reports/wayback_yahoo_finance_consensus.csv
        dest:   data/Yahoo.Finance/wayback_yahoo_finance_consensus.csv
      - source: data/reports/raw_wayback_coverage_matrix.csv
        dest:   data/Yahoo.Finance/raw_wayback_coverage_matrix.csv
      - source: data/reports/raw_yahoo_finance_consensus_history.csv
        dest:   data/Yahoo.Finance/raw_yahoo_finance_consensus_history.csv
      - source: raw_column_definition_YahooFinance.md
        dest:   definitions/raw_column_definition_YahooFinance.md
      - source: definitions/raw_yahoo_finance_consensus_history_definition.md
        dest:   definitions/raw_yahoo_finance_consensus_history_definition.md
    repos: |
      wenchiehlee-money/biztrends.TW
