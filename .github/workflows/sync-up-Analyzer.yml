name: Sync to Analyzer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - data/reports/raw_yahoo_finance.csv
      - raw_column_definition.md
      - .github/sync-to-Analyzer.yml
      - .github/workflows/sync-up-Analyzer.yml

concurrency:
  group: sync-yahoo-analyzer
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SYNC_PAT_ANALYZER: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_INVESTMENT }}
    steps:
      - uses: actions/checkout@v4
      - name: Sync to Analyzer
        if: env.SYNC_PAT_ANALYZER != ''
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_ANALYZER }}
          CONFIG_PATH: .github/sync-to-Analyzer.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true
      - name: Skip sync notice
        if: env.SYNC_PAT_ANALYZER == ''
        run: echo "::warning::REPO_FILE_SYNC_WENCHIEHLEE_INVESTMENT is not configured; skipping Analyzer sync."
