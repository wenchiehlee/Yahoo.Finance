name: Daily Yahoo Finance Fetch

on:
  schedule:
    - cron: "30 19 * * *"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      market:
        description: "Market to fetch"
        required: false
        default: "all"
        type: choice
        options: [all, tw, us]
      tw_list:
        description: "Taiwan list to use"
        required: false
        default: "all"
        type: choice
        options: [all, focus]
      specific_symbols:
        description: "Optional comma-separated symbols, e.g. 2330,2454,NVDA"
        required: false
        default: ""

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SYNC_PAT_ANALYZER: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_INVESTMENT }}
      SYNC_PAT_BIZTRENDS: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_MONEY }}
      SYNC_PAT_TAIEX: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_MONEY }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update Taiwan stock lists
        run: python Get觀察名單.py

      - name: Validate synced inputs
        run: |
          test -f data/ConceptStocks/raw_conceptstock_company_metadata.csv || echo "::warning::data/ConceptStocks/raw_conceptstock_company_metadata.csv missing; US fetch will be empty"
          test -f data/reports/raw_factset_detailed_report.csv || echo "::warning::raw_factset_detailed_report.csv missing; summary cross-check will be marked missing_factset_source"

      - name: Fetch Yahoo Finance analysis
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            MARKET="all"
            TW_LIST="all"
            SYMBOLS="2330,NVDA"
            RAW_OUTPUT="data/reports/raw_yahoo_finance_smoke.csv"
          else
            MARKET="${{ github.event.inputs.market || 'all' }}"
            TW_LIST="${{ github.event.inputs.tw_list || 'all' }}"
            SYMBOLS="${{ github.event.inputs.specific_symbols || '' }}"
            RAW_OUTPUT="data/reports/raw_yahoo_finance.csv"
          fi
          echo "RAW_OUTPUT=$RAW_OUTPUT" >> "$GITHUB_ENV"
          python fetch_group/fetch_cli.py --market "$MARKET" --tw-list "$TW_LIST" --specific-symbols "$SYMBOLS" --output-csv "$RAW_OUTPUT"

      - name: Generate forecast summary
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            SUMMARY_OUTPUT="data/reports/raw_yahoo_finance_summary_smoke.csv"
          else
            SUMMARY_OUTPUT="data/reports/raw_yahoo_finance_summary_latest.csv"
          fi
          python process_group/process_cli.py --raw-csv "$RAW_OUTPUT" --output-csv "$SUMMARY_OUTPUT"

      - name: Commit generated reports
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add StockID_TWSE_TPEX.csv StockID_TWSE_TPEX_focus.csv data/reports/raw_yahoo_finance.csv data/reports/raw_yahoo_finance_summary_latest.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Yahoo Finance forecasts ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Sync raw Yahoo report to Analyzer
        # Runs only when the repo has the cross-repo sync PAT configured.
        if: github.event_name != 'push' && env.SYNC_PAT_ANALYZER != ''
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_ANALYZER }}
          CONFIG_PATH: .github/sync-to-Analyzer.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Sync forecast summary to biztrends.TW
        if: github.event_name != 'push' && env.SYNC_PAT_BIZTRENDS != ''
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_BIZTRENDS }}
          CONFIG_PATH: .github/sync-to-biztrends.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Sync forecast summary to TAIEX.TW
        if: github.event_name != 'push' && env.SYNC_PAT_TAIEX != ''
        continue-on-error: true
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_TAIEX }}
          CONFIG_PATH: .github/sync-to-TAIEX.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Sync skip notices
        run: |
          if [ -z "$SYNC_PAT_ANALYZER" ]; then
            echo "::warning::REPO_FILE_SYNC_WENCHIEHLEE_INVESTMENT is not configured; skipping Analyzer sync."
          fi
          if [ -z "$SYNC_PAT_BIZTRENDS" ]; then
            echo "::warning::REPO_FILE_SYNC_WENCHIEHLEE_MONEY is not configured; skipping biztrends.TW sync."
          fi
